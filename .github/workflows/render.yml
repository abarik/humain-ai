name: Render and deploy Quarto site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto website
        run: quarto render

      - name: Debug SSH reachability
        run: |
          echo "DNS lookup:"
          getent hosts psycho.unideb.hu || true

          echo "Testing port 22:"
          nc -vz psycho.unideb.hu 22 || true

          echo "Trying ssh-keyscan:"
          ssh-keyscan -T 30 psycho.unideb.hu || true

      - name: Set up SSH
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          ssh-keyscan -T 30 -H psycho.unideb.hu >> "$HOME/.ssh/known_hosts"

          ssh -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            deploy@psycho.unideb.hu \
            "echo SSH connection OK"
            
      - name: Deploy to Apache directory
        run: |
          rsync -avz --delete _site/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"