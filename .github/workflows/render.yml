name: Render and trigger server deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install babelquarto
        run: |
          Rscript -e 'install.packages("babelquarto", repos = c("https://ropensci.r-universe.dev", "https://cloud.r-project.org"))'

      - name: Check babelquarto installation
        run: |
          Rscript -e 'packageVersion("babelquarto")'

      - name: Render babelquarto website
        env:
          BABELQUARTO_CI_URL: "https://psycho.unideb.hu/humain-ai/"
        run: |
          Rscript -e 'babelquarto::render_website(project_path = ".")'

      - name: Upload rendered site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: humain-ai-site
          path: _site/
          retention-days: 7

      - name: Trigger deploy on psycho.unideb.hu
        run: |
          curl -fsS -X POST "https://psycho.unideb.hu/deploy-humain-ai/deploy.php" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.PSYCHO_DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"run_id": "${{ github.run_id }}"}'
            