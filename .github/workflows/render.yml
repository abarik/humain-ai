name: Render and deploy Quarto site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto website
        run: quarto render

      - name: Set up SSH
        run: |
          set -e
          echo "HOME=$HOME"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
      
          echo "Checking private key file..."
          test -s "$HOME/.ssh/id_ed25519"
      
          echo "Adding host key..."
          ssh-keyscan -T 20 -H "${{ secrets.DEPLOY_HOST }}" >> "$HOME/.ssh/known_hosts"
      
          echo "Testing SSH connection..."
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "echo SSH connection OK"

      - name: Deploy to Apache directory
        run: |
          rsync -avz --delete _site/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"